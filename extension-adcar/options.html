<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AdCar CRM Settings</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  max-width: 500px; margin: 40px auto; padding: 20px;
  background: #f8f9fa; color: #333;
}
.container { 
  background: white; padding: 30px; border-radius: 12px; 
  box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
}
h1 { text-align: center; color: #4CAF50; margin-bottom: 30px; }
.form-group { margin-bottom: 20px; }
label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
input { 
  width: 100%; padding: 12px; border: 2px solid #e0e0e0; 
  border-radius: 8px; font-size: 16px; box-sizing: border-box; 
  transition: border-color 0.3s; 
}
input:focus { outline: none; border-color: #4CAF50; }
#save { 
  width: 100%; padding: 15px; 
  background: linear-gradient(135deg, #4CAF50, #45a049); 
  color: white; border: none; border-radius: 8px; 
  font-size: 16px; font-weight: 600; cursor: pointer; 
  transition: transform 0.2s; 
}
#save:hover { transform: translateY(-2px); }
#status { margin-top: 15px; text-align: center; font-weight: 500; min-height: 20px; }
</style>
</head>
<body>
<div class="container">
  <h1>🚗 AdCar CRM</h1>
  <div class="form-group">
    <label for="department">Отдел</label>
    <input type="text" id="department" placeholder="Импорт Япония">
  </div>
  <div class="form-group">
    <label for="host">API Host (tunnel)</label>
    <input type="text" id="host" placeholder="http://localhost:8080">
  </div>
  <button id="save">💾 Сохранить</button>
  <div id="status"></div>
</div>
<script src="options.js"></script>
</body>
</html>
